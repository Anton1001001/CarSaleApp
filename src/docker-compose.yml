version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672" 
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  file-api:
    build:
      context: .
      dockerfile: Services/File/File.API/Dockerfile
    container_name: file_api
    env_file:
      - Services/File/File.API/.env
    ports:
      - "1000:1000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:1000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      
  file-grpc:
    build:
      context: .
      dockerfile: Services/File/File.GrpcService/Dockerfile
    container_name: file-grpc
    env_file:
      - Services/File/File.GrpcService/.env
    ports:
      - "7000:7000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:7000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "6379:6379"
      - "8001:8001"
    restart: always

  car-api:
    build:
      context: .
      dockerfile: Services/Car/Car.API/Dockerfile
    container_name: car_api
    environment:
      ASPNETCORE_URLS: http://+:5000
    env_file:
      - Services/Car/Car.API/.env
    ports:
      - "5000:5000"
    depends_on:
      - redis-stack
  
  car-grpc:
    build:
      context: .
      dockerfile: Services/Car/Car.GrpcService/Dockerfile
    container_name: car-grpc
    environment:
      ASPNETCORE_URLS: http://+:8000
    env_file:
      - Services/Car/Car.GrpcService/.env
    ports:
      - "8000:8000"
        
  advert-api:
    build:
      context: .
      dockerfile: Services/Advert/Advert.API/Dockerfile
    container_name: advert_api
    environment:
      ASPNETCORE_URLS: http://+:9000
    ports:
      - "9000:9000"
    depends_on:
      - redis-stack
      - car-grpc
      - file-grpc
      - rabbitmq
  
volumes:
  redis-data:

