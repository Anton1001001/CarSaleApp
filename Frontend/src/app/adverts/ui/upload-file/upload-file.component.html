<nz-upload
  [nzShowUploadList]="false"
  nzAction="http://localhost:5000/api/files/upload"
  [nzFileList]="fileList"
  [nzMultiple]="true"
  (nzChange)="handleChange($event)"
>
  <button [disabled]="disabled" class="upload-button" nz-button>
    <nz-icon nzType="upload" />
    Выбрать...
  </button>
</nz-upload>
